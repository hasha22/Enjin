<!DOCTYPE html>
<html>
<body>

<h2>Slider Client</h2>

<input type="range" min="0" max="4" value="2" step="1" id="slider">
<p id="sliderValue">Neutral</p>

<button onclick="submitSlider()">Submit</button>

<div id="log"></div>

<script>
const ws = new WebSocket("ws://localhost:5040");

const labels = [
  "Disagree",
  "Somewhat Disagree",
  "Neutral",
  "Somewhat Agree",
  "Agree"
];

ws.onmessage = (event) => {
  const msg = JSON.parse(event.data);

  if (msg.type === "slider_submit") {
    log("Unity sent slider: " + msg.value + " (" + msg.label + ")");
  }

  if (msg.type === "button_pressed") {
    log("Unity pressed button!");
  }
};

// SLIDER UI
const slider = document.getElementById("slider");
const sliderValue = document.getElementById("sliderValue");

slider.oninput = function () {
  sliderValue.innerText = labels[this.value];
};

// SUBMIT ONLY
function submitSlider() {
  ws.send(JSON.stringify({
    type: "slider_submit",
    value: parseInt(slider.value),
    label: labels[slider.value]
  }));
}

function log(text) {
  document.getElementById("log").innerHTML += "<p>" + text + "</p>";
}
</script>

</body>
</html>
